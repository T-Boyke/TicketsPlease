name: .NET CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore src/TicketsPlease.slnx
    - name: Verify Formatting
      run: dotnet format src/TicketsPlease.slnx --verify-no-changes
    - name: Build
      run: dotnet build src/TicketsPlease.slnx --no-restore --configuration Release
    - name: Test
      run: dotnet test src/TicketsPlease.slnx --no-build --configuration Release --verbosity normal
