name: First Interaction

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Hello! Thank you for opening your first issue here. 🚀
            We take every report seriously. Please make sure you've followed the templates.
            Someone from the team (or our AI Assistant) will get back to you soon!
          pr-message: |
            Welcome! Thank you for your first Pull Request. 💎
            Please ensure your code follows our **Clean Architecture** guidelines and you've used **Conventional Commits**.
            Our CI will now run the security and quality checks.
